<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Donate – Subhvaishali Foundation</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600;700;800&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family: "Poppins", sans-serif;
  background: linear-gradient(135deg,#ffe1c8,#ffd6b4,#fff2e6);
  min-height:100vh;
  padding:40px 20px;
  overflow-x:hidden;
}

/* Fade + Slide animation */
.reveal{
  opacity:0;
  transform:translateY(30px);
  transition:all .8s ease;
}
.reveal.show{
  opacity:1;
  transform:translateY(0);
}

/* Center box */
.container{
  max-width:480px;
  margin:auto;
}

/* Glass Card */
.card{
  background:rgba(255,255,255,0.55);
  backdrop-filter: blur(12px);
  border:1px solid rgba(255,255,255,0.4);
  border-radius:22px;
  padding:30px;
  box-shadow:0 12px 40px rgba(255,128,0,0.22);
  animation:fadeIn 1.2s ease-out;
}

@keyframes fadeIn{
 from{opacity:0; transform:scale(0.95);}
 to{opacity:1; transform:scale(1);}
}

h2{
  margin-top:0;
  font-weight:800;
  font-size:28px;
  background:linear-gradient(90deg,#ff6a00,#ff9440);
  -webkit-background-clip:text;
  color:transparent;
}

p{
  font-size:14px;
  opacity:0.8;
}

/* Input */
input{
  width:100%;
  padding:14px;
  border-radius:14px;
  font-size:16px;
  border:1px solid #ffd1ad;
  margin-top:12px;
  background:#fff;
  transition:0.3s;
}
input:focus{
  border-color:#ff6a00;
  box-shadow:0 0 0 3px rgba(255,106,0,0.25);
  outline:none;
}

/* Button */
button{
  width:100%;
  margin-top:18px;
  background:linear-gradient(135deg,#ff6a00,#ff9140);
  color:white;
  padding:14px;
  border-radius:14px;
  font-size:18px;
  font-weight:700;
  border:none;
  cursor:pointer;
  box-shadow:0 14px 30px rgba(255,106,0,0.5);
  transition:0.3s;
}
button:hover{
  transform:translateY(-3px);
  box-shadow:0 18px 34px rgba(255,106,0,0.6);
}
</style>
</head>

<body>

<div class="container reveal">
  <div class="card">
  
    <h2>Support Subhvaishali Foundation</h2>
    <p>Your contribution helps children, families & communities. Choose an amount to proceed securely through PhonePe.</p>

    <form action="pay.php" method="POST">
      <input type="number" name="amount" required placeholder="Enter amount (₹)" min="1">
      <button type="submit">Donate via PhonePe →</button>
    </form>

  </div>
</div>

<script>
const el=document.querySelector('.reveal');
setTimeout(()=>{ el.classList.add('show'); },150);
</script>

</body>
</html>
